services:
  app:
      build: .
      ports:
        - 127.0.0.1:8000:80
      working_dir: /app
      environment:
        USE_COMPOSE_DB: True
        DB_DRIVER: pymysql
        DB: mysql
        MYSQL_HOST: mysql 
        MYSQL_PORT: 3306
        MYSQL_USER: root
        MYSQL_PASSWORD: secret
        MYSQL_DB: banks
      depends_on:
        - mysql
  mysql:
      image: mysql:8.0
      ports:
        - 127.0.0.1:3309:3306
      environment:
        MYSQL_ROOT_PASSWORD: secret
        MYSQL_DATABASE: banks